name: Daily Account Report

on:
  schedule:
    # Covers 16:10 America/New_York during daylight saving time.
    - cron: "10 20 * * 1-5"
    # Covers 16:10 America/New_York during standard time.
    - cron: "10 21 * * 1-5"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check New York schedule
        id: schedule-check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ny_time="$(TZ=America/New_York date +%H:%M)"
          ny_day="$(TZ=America/New_York date +%u)"
          if [ "$ny_time" = "16:10" ] && [ "$ny_day" -ge 1 ] && [ "$ny_day" -le 5 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping because New York time is ${ny_time}, day ${ny_day}."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/checkout@v7

      - name: Set up Python
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.schedule-check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Download trade record workbook
        if: steps.schedule-check.outputs.should_run == 'true'
        env:
          TRADE_RECORD_URL: ${{ secrets.TRADE_RECORD_URL }}
        run: |
          if [ -z "$TRADE_RECORD_URL" ]; then
            echo "Missing required secret: TRADE_RECORD_URL"
            exit 1
          fi

          DOWNLOAD_URL="$TRADE_RECORD_URL"
          if [[ "$TRADE_RECORD_URL" =~ docs\.google\.com/spreadsheets/d/([^/]+) ]]; then
            SHEET_ID="${BASH_REMATCH[1]}"
            DOWNLOAD_URL="https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx"
          fi

          mkdir -p data
          curl -fL "$DOWNLOAD_URL" -o data/trade_record.xlsx

          python - <<'PY'
          from pathlib import Path

          path = Path("data/trade_record.xlsx")
          header = path.read_bytes()[:4]
          if header != b"PK\x03\x04":
              print("Downloaded file is not an .xlsx workbook.")
              print("For Google Sheets, make sure the sheet is shared so the workflow can download it.")
              print("If you use a normal Google Sheet URL, the workflow will convert it to an xlsx export URL.")
              raise SystemExit(1)
          PY

      - name: Generate report
        if: steps.schedule-check.outputs.should_run == 'true'
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          mkdir -p reports
          python generate_account_report.py \
            --input data/trade_record.xlsx \
            --output "reports/account_report_$(date +%F).md" \
            --force-refresh

      - name: Upload report artifact
        if: steps.schedule-check.outputs.should_run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: account-report-${{ github.run_id }}
          path: reports/account_report_*.md
          if-no-files-found: error
