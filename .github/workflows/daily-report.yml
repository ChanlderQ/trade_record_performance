name: Daily Account Report

on:
  schedule:
    # Runs every day at 13:00 UTC.
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download trade record workbook
        env:
          TRADE_RECORD_URL: ${{ secrets.TRADE_RECORD_URL }}
        run: |
          if [ -z "$TRADE_RECORD_URL" ]; then
            echo "Missing required secret: TRADE_RECORD_URL"
            exit 1
          fi
          mkdir -p data
          curl -L "$TRADE_RECORD_URL" -o data/trade_record.xlsx

      - name: Generate report
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          mkdir -p reports
          python generate_account_report.py \
            --input data/trade_record.xlsx \
            --output "reports/account_report_$(date +%F).md" \
            --force-refresh

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: account-report-${{ github.run_id }}
          path: reports/account_report_*.md
          if-no-files-found: error
